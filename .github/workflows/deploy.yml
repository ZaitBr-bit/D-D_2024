name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          # Monta o artifact preservando a estrutura atual servida em producao:
          # raiz com redirect -> /site/, a app em site/ e os dados em dados/
          # (a app usa BASE_PATH '../dados', que resolve para /D-D_2024/dados).
          # Assim a URL publica continua .../D-D_2024/site/ apos migrar o Pages
          # para GitHub Actions, e o sed passa a valer de fato em producao.
          mkdir -p _dist
          cp index.html _dist/index.html
          cp -r site _dist/site
          cp -r dados _dist/dados
          # Lista de todos os JSON de dados para precache offline do Service Worker.
          # URLs relativas ao escopo do SW (/site/): ../dados/....json
          python3 - <<'PY'
          import os, json
          urls = []
          for root, _, files in os.walk('_dist/dados'):
              for f in files:
                  if f.endswith('.json'):
                      p = os.path.join(root, f).replace('_dist/dados', '../dados').replace(os.sep, '/')
                      urls.append(p)
          with open('_dist/site/dados-precache.json', 'w', encoding='utf-8') as fh:
              json.dump(sorted(urls), fh, ensure_ascii=False)
          PY
          sed -i "s|const CACHE_VERSION = 0; // AUTO|const CACHE_VERSION = ${{ github.run_number }};|" _dist/site/sw.js
          sed -i "s|v0</span><!-- VERSION_AUTO -->|v${{ github.run_number }}</span><!-- VERSION_AUTO -->|" _dist/site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
